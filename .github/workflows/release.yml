name: Release

# Publishes on an annotated tag like `v1.0.0`. The tag is the single source of
# truth for a release; `package.json` version must match (verified below).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    name: Publish to Marketplace, Open VSX & GitHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      # Refuse to release if the tag and the manifest version disagree.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Verify artifacts & ergonomics
        run: |
          npm run check
          npm run audit

      - name: Package
        run: npx --yes @vscode/vsce package --no-dependencies --out "construct-theme-${GITHUB_REF_NAME}.vsix"

      - name: Publish to Visual Studio Marketplace
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath "construct-theme-${GITHUB_REF_NAME}.vsix"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        run: npx --yes ovsx publish "construct-theme-${GITHUB_REF_NAME}.vsix" --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: construct-theme-${{ github.ref_name }}.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
